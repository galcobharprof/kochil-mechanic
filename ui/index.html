<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JG Mechanic - Modification Menu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Outfit:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" style="display: none;">
        <!-- Control for camera dragging -->
        <div id="camera-drag" class="camera-drag"></div>

        <div class="main-ui-wrapper">
            <!-- NAVIGATION SIDEBAR -->
            <aside class="sidebar">
                <div class="logo">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                </div>
                <nav class="nav-categories">
                    <div class="nav-item active" data-category="main" title="Home">
                        <i class="fa-solid fa-house"></i>
                        <span class="nav-label">Main</span>
                    </div>
                    <div class="nav-item" data-category="performance" title="Performance">
                        <i class="fa-solid fa-gauge-high"></i>
                        <span class="nav-label">Performance</span>
                    </div>
                    <div class="nav-item" data-category="cosmetic" title="Cosmetic">
                        <i class="fa-solid fa-car-side"></i>
                        <span class="nav-label">Cosmetic</span>
                    </div>
                    <div class="nav-item" data-category="paint" title="Paint">
                        <i class="fa-solid fa-palette"></i>
                        <span class="nav-label">Paint</span>
                    </div>
                    <div class="nav-item" data-category="wheels" title="Wheels">
                        <i class="fa-solid fa-circle-dot"></i>
                        <span class="nav-label">Wheels</span>
                    </div>
                </nav>
            </aside>

            <!-- MAIN MODIFICATION PANEL -->
            <main class="content">
                <header class="content-header">
                    <div class="header-left">
                        <button class="back-btn" id="back-btn" style="display: none;"><i class="fa-solid fa-chevron-left"></i></button>
                        <h1 id="category-title">MODS</h1>
                    </div>
                    <button class="close-btn" id="close-btn"><i class="fa-solid fa-xmark"></i></button>
                </header>

                <div id="main-view" class="grid-view">
                    <!-- Categories populated by JS logic -->
                    <div class="category-card" data-category="performance">
                        <img src="images/engine.png" alt="Engine">
                        <div class="card-info">
                            <h2>Performance</h2>
                            <p>Power & Braking</p>
                        </div>
                    </div>
                    <div class="category-card" data-category="cosmetic">
                        <img src="images/body.png" alt="Body">
                        <div class="card-info">
                            <h2>Cosmetic</h2>
                            <p>Aerodynamics</p>
                        </div>
                    </div>
                    <div class="category-card" data-category="paint">
                        <img src="images/paint.png" alt="Paint">
                        <div class="card-info">
                            <h2>Paint</h2>
                            <p>Colors & Finish</p>
                        </div>
                    </div>
                    <div class="category-card" data-category="wheels">
                        <img src="images/wheels.png" alt="Wheels">
                        <div class="card-info">
                            <h2>Wheels</h2>
                            <p>Rims & Tires</p>
                        </div>
                    </div>
                </div>

                <div id="item-view" class="list-view" style="display: none;">
                    <!-- Items populated by JS -->
                </div>
            </main>
        </div>

        <!-- FLOATING CART -->
        <div class="basket-summary">
            <div class="cart-header">
                <i class="fa-solid fa-shopping-cart"></i>
                <h3>SHOPPING CART</h3>
            </div>
            
            <div id="basket-items">
                <!-- Items populated by JS -->
            </div>

            <div class="cart-footer">
                <div class="total-section">
                    <span>Total:</span>
                    <span id="total-price">$0</span>
                </div>
                <button class="checkout-btn disabled" id="checkout-btn">CHECKOUT</button>
            </div>
        </div>
    </div>

    <!-- Receipt Notepad -->
    <div id="receipt-notepad" style="display: none;">
        <div class="notepad-paper">
            <header class="notepad-header">
                <span class="notepad-title">MODIFICATION RECEIPT</span>
                <button id="close-notepad"><i class="fa-solid fa-xmark"></i></button>
            </header>
            <div class="notepad-content">
                <div class="notepad-lines" id="receipt-content">
                    <!-- Receipt text goes here -->
                </div>
            </div>
            <div class="notepad-footer">
                <span>Thank you for your business!</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
